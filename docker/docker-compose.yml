version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# AgentOS Docker Compose
#
# Services:
#   qdrant  — Vector database (episodic memory)
#   redis   — Cache + session store
#   agentos — FastAPI research service
#   init    — One-shot container that creates Qdrant collections on first run
#
# Usage:
#   docker compose up -d                 # Start all services
#   docker compose logs -f agentos       # Follow app logs
#   docker compose down -v               # Stop and remove volumes
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Qdrant Vector Database ─────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: agentos-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"       # REST API
      - "6334:6334"       # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Redis Cache ────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: agentos-redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  # ── Collection Init (one-shot) ─────────────────────────────────────────────
  # Runs after Qdrant is healthy and creates the required collections.
  # Exits with code 0 on success; Docker marks it "exited (0)" which is fine.
  init:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: agentos-init
    command: ["python", "scripts/init_qdrant.py"]
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
    env_file:
      - ../.env
    depends_on:
      qdrant:
        condition: service_healthy
    restart: "no"

  # ── AgentOS FastAPI Service ────────────────────────────────────────────────
  agentos:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: agentos-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      REDIS_URL: redis://redis:6379/0
    env_file:
      - ../.env
    depends_on:
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
      init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    volumes:
      # Mount model cache so re-runs don't re-download the embedding model
      - model_cache:/home/agentos/.cache

volumes:
  qdrant_data:
    name: agentos_qdrant_data
  model_cache:
    name: agentos_model_cache

networks:
  default:
    name: agentos_network
